<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <title>Voltara | Ecommerce Home</title>
</head>
<style>
       * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    :root {
        --primary: #4d8c8c;
        --primary-light: #85b3b3;
        --accent: #ff7a59;
        --text: #1f2a36;
        --muted: #65757f;
        --bg: #f4f7f8;
    }

    body {
        background: var(--bg);
        color: var(--text);
    }

    nav {
        width: 100%;
        background: #ffffffcc;
        backdrop-filter: blur(10px);
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding: 20px 40px;
        position: sticky;
        top: 0;
        z-index: 10;
        border-bottom: 1px solid rgba(0, 0, 0, 0.06);
    }

    .logo img {
        width: 50px;
        height: 50px;
        object-fit: contain;
    }

    .brand {
        font-size: 28px;
        font-weight: 700;
        color: var(--primary);
        letter-spacing: 0.04em;
        display: inline-flex;
        align-items: center;
        gap: 12px;
    }

    .menu {
        display: flex;
        gap: 28px;
        list-style: none;
        align-items: center;
        flex-wrap: wrap;
    }

    .menu li a {
        text-decoration: none;
        color: var(--text);
        font-size: 15px;
        transition: color 0.2s ease;
    }

    .menu li a:hover {
        color: var(--primary);
    }

    .search {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: nowrap;
    }

    .search input {
        flex: 1 1 140px;
        min-width: 120px;
        padding: 10px 14px;
        border: 1px solid #d9e1e5;
        border-radius: 999px;
        width: 180px;
        max-width: 240px;
        transition: width 0.3s ease;
    }

    .search button {
        flex: 0 0 auto;
    }

    .search input:focus {
        width: 240px;
        outline: none;
        border-color: var(--primary);
    }

    .search button {
        border: none;
        padding: 10px 14px;
        background: var(--primary);
        border-radius: 999px;
        color: white;
        cursor: pointer;
    }

    main {
        margin-top: 24px;
    }

  .products-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 20px; /* Space between posters */
  padding: 20px;
  justify-content: center;
  justify-items: center;
  max-width: 1200px;
  margin: 0 auto;
}


.product-card {
  width: 100%;
  cursor: pointer;
  overflow: hidden;
  border-radius: 8px;
  transition: transform 0.3s ease, box-shadow 0.3s ease;
}

.product-card img {
  width: 100%;
  height: auto;
  display: block;
}

.product-card h3 {
  padding: 12px 14px 18px;
  font-size: 1rem;
  color: var(--text);
  background: #ffffff;
}

.product-card:hover {
  transform: scale(1.05);
  box-shadow: 0 15px 35px rgba(0, 0, 0, 0.12);
}

@media (max-width: 860px) {
  .brand {
    order: 1;
    width: 100%;
    justify-content: center;
    display: flex;
    text-align: center;
  }

  .menu {
    order: 2;
    width: 100%;
    justify-content: center;
    gap: 16px;
  }

  .search {
    order: 3;
    width: 100%;
    justify-content: flex-start;
  }

  .search input {
    width: 100%;
    max-width: 320px;
  }
}

@media (max-width: 560px) {
  nav {
    padding: 18px 20px;
  }
  

  .menu {
    justify-content: center;
  }

  .search {
    justify-content: center;
  }

  .search button {
    width: 100%;
    max-width: 90px;
  }
}
</style>
<body>
